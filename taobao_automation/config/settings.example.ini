# 复制本文件为 settings.ini 后填写真实值。settings.ini 已被 .gitignore 忽略，勿提交仓库。
# 敏感项也可用环境变量覆盖（见各节注释）。

[BROWSER]
# 插件导出文件下载目录
download_dir = data/downloads

[PLUGIN]
analysis_timeout = 120
export_timeout = 60
selectors_file = config/selectors.json

[INPUT]
excel_file =
card_name_column = 中文卡牌名
product_id_column = productId
keyword_prefix = 万智牌

[FILTER]
require_magic_prefix = true
require_card_name = true
filtered_dir = data/filtered
# LLM 过滤时是否加载万智牌数据库候选写入 prompt
use_db_reference = false
# 短中文牌名硬拦截：若标题命中目标短名且命中更长官方中文名，直接判定不保留
short_name_hard_veto = true
# 每个目标牌名最多加载多少个“更长官方中文名”用于冲突判定
short_name_conflict_limit = 20

[RATE_LIMIT]
delay_min = 5
delay_max = 15
pause_every = 50
pause_duration = 60

[CHECKPOINT]
checkpoint_dir = data/checkpoints
auto_resume = true

[LOGGING]
level = INFO
log_file = data/logs/automation.log

[DB]
# MTG_DB_HOST, MTG_DB_PORT, MTG_DB_NAME, MTG_DB_USER, MTG_DB_PASSWORD
enabled = false
use_ssh_tunnel = false
host =
port = 3306
database =
username =
password =
connect_timeout = 8
max_candidates_per_name = 5

[SSH]
# MTG_SSH_HOST, MTG_SSH_PORT, MTG_SSH_USER, MTG_SSH_PASSWORD
host =
port = 22
username =
password =
local_bind_port = 0

[LLM]
# minimax 或 zhipu
provider = zhipu
# 环境变量：MINIMAX_API_KEY, MINIMAX_GROUP_ID, ZHIPU_API_KEY
minimax_api_key =
minimax_group_id =
zhipu_api_key =
batch_size = 5
max_workers = 5
request_delay = 0.5
# 首轮标「需要联网」后走智谱对话联网第二判（仅 zhipu）
use_web_search_fallback = false
web_search_model = glm-4-air
web_search_engine = search_pro
web_search_count = 5
web_search_content_size = medium
web_search_recency_filter = noLimit
# 可选，不设则用代码内默认
# web_search_prompt =
