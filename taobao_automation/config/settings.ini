[BROWSER]
# 插件导出文件下载目录
download_dir = data/downloads

[PLUGIN]
# 分析结果加载超时时间（秒）
analysis_timeout = 120
# 导出下载超时时间（秒）
export_timeout = 60
# DOM选择器配置文件
selectors_file = config/selectors.json

[INPUT]
# Excel输入文件路径
excel_file =
# 牌名所在列名
card_name_column = 中文卡牌名
# productId所在列名
product_id_column = productId
# 搜索关键词前缀
keyword_prefix = 万智牌

[FILTER]
# 标题必须包含"万智牌"或"MTG"
require_magic_prefix = true
# 标题必须包含牌名
require_card_name = true
# 过滤结果输出目录
filtered_dir = data/filtered

[RATE_LIMIT]
# 关键词间延迟范围（秒）
delay_min = 5
delay_max = 15
# 每处理N个关键词暂停一次
pause_every = 50
pause_duration = 60

[CHECKPOINT]
# 检查点文件目录
checkpoint_dir = data/checkpoints
# 启动时自动恢复未完成的任务
auto_resume = true

[LOGGING]
level = INFO
log_file = data/logs/automation.log

[LLM]
# LLM provider: minimax 或 zhipu
provider = minimax
# MiniMax API配置（也可通过环境变量 MINIMAX_API_KEY 和 MINIMAX_GROUP_ID 设置）
minimax_api_key =
minimax_group_id =
# 智谱GLM API配置（也可通过环境变量 ZHIPU_API_KEY 设置）
zhipu_api_key =
# 并发控制
batch_size = 5
max_workers = 5
request_delay = 0.5
