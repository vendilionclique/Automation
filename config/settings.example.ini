# 复制本文件为 config/settings.ini 后在本机填写密钥与主机等敏感项。
# settings.ini 已被 .gitignore 忽略，勿提交仓库。
#
# 下列键含敏感信息，示例中一律留空，请在本机 settings.ini 或环境变量中补齐：
#   LLM: zhipu_api_key（可用环境变量 ZHIPU_API_KEY）
#   DB: host / database / username / password（可用环境变量 MTG_DB_*）
#   SSH: host / username / password（可用环境变量 MTG_SSH_*）
#   PRODUCT_ROUTING: raw_input_file（本机 Excel 路径）
#
# 本文件默认值已与当前 Midscene computer 视觉主线对齐（非敏感项）；
# 与代码内 fallback 不一致时以本文件为准。

[VISUAL_CAPTURE]
# 当前主线：midscene-computer MCP，由 Codex App 调度。
# 只使用系统截图观察和系统鼠标/键盘/滚轮动作，不连接淘宝页面 CDP，
# 不读取 DOM/HTML/network/cookies/storage。
provider = midscene_computer
confidence_threshold = 0.80
# 正常 ingest 成功后删除原始截图；人工介入级异常才保留截图。
screenshot_retention = false

[VISUAL_DEDUPE]
# apply 阶段确定性去重：硬去重之外，按同关键词、同价格、店铺近似、标题高度近似跳过重复行。
fuzzy_enabled = true
store_similarity_threshold = 0.70
title_similarity_threshold = 0.95
fuzzy_examples_limit = 20

[MIDSCENE_COMPUTER]
# Midscene computer 由 Codex App MCP 调度；本项目只生成任务请求与证据路径。
# 采集前用 local/start_taobao_visual_chrome.sh 启动专用 Chrome profile，
# 人工登录淘宝，并保证 Chrome 位于前台。
window_width = 1600
window_height = 1000
max_scrolls_per_keyword = 2
page_load_wait = 2
session_keyword_limit = 3
keyword_timeout_seconds = 180
mcp_request_timeout_seconds = 180
consecutive_abnormal_stop = 2
min_rows_per_keyword = 5
screenshot_prefixes = initial,results,scroll_1

[MIDSCENE_MODEL]
# Midscene computer 的外部 VLM 只用于局部视觉定位/操作，不作为最终商品字段来源。
# 默认使用付费高速 GLM-4.6V-FlashX；Kimi/Moonshot 已放弃，不作为主线。
# GLM-5V-Turbo 仅保留为后续 A/B 评估候选。
# 真实 key 建议填到 local/midscene-computer.env；本节仅记录期望配置名。
enabled = true
model_name = glm-4.6v-flashx
model_family = glm-v
base_url = https://open.bigmodel.cn/api/paas/v4
api_key_env = MIDSCENE_MODEL_API_KEY
reasoning_enabled = false
temperature = 0
allow_midscene_act = true
allow_midscene_query = false
final_extraction_owner = codex

[CODEX_EXTRACT]
# 新主线：短命 Codex extract worker 读取 keyword 级截图 contract，产出 rows_result.json；
# 确定性落盘由 visual-apply-extracted-rows 完成。它不打开 Chrome、不触碰淘宝页面。
# macOS Codex App bundled CLI 通常在 /Applications/Codex.app/Contents/Resources/codex；
# 若 PATH 中已有 codex，可改为 codex。
codex_bin = /Applications/Codex.app/Contents/Resources/codex
profile = taobao_visual_extract
model = gpt-5.5
sandbox = danger-full-access
approval_policy = never
ignore_rules = true
json_events = true
ephemeral = true
max_parallel = 1
drain_poll_seconds = 20
drain_idle_timeout_seconds = 900

[SCHEDULER]
# 从全量台账中自动挑选当天要采集的 statistical 牌名。
daily_keyword_budget = 120
daily_session_count = 4
capture_freshness_days = 30
# 生产建议配置为固定时刻，数量必须等于 daily_session_count，例如：
# session_due_times = 09:00,13:00,17:00,21:00
session_due_times =
# 测试用：从 plan 创建时间起，每隔 N 分钟让下一个 session 到期；大于 0 时优先于 session_due_times。
session_due_interval_minutes = 0
# heartbeat 判断 capture_worker_runtime.json 中 running worker 失联的阈值。
capture_worker_stale_after_minutes = 240

[CAPTURE_WATCHDOG]
# Codex App Automation 到点后启动的 session 级 bounded watchdog。
# 它在单个 session 生命周期内监督 capture worker，按 heartbeat 的 capture_start_allowed
# 建议启动/恢复；不直接操作 Chrome、不调用 Midscene MCP、不看截图、不抽取商品。
poll_seconds = 30
idle_timeout_seconds = 900
max_restarts = 2

[VISUAL_BEHAVIOR]
# 每段格式：min_seconds,max_seconds,probability。短暂停集中在短段，少量进入长段。
micro_pause_short = 0.2,0.8,0.90
micro_pause_medium = 0.8,1.5,0.08
micro_pause_long = 1.5,2.5,0.02
# 生产默认：关键词之间使用分钟级长暂停；短间隔只用于测试/观察配置时显式覆盖。
inter_keyword_pause_min = 180
inter_keyword_pause_max = 420
detail_page_peek_probability = 0.08
cart_or_favorites_peek_probability = 0.03
allow_cart_or_favorites_peek = true
allow_claim_rewards = false

[PAGE_SAMPLING]
# viewport tiles：每次系统截图是一个可见窗口 tile；不使用 DOM/CDP/full-page 截图。
# 48 只是第一页搜索结果的近似保护上限；v1 主要按 max_tiles 截完整页可见 tiles，不按该数字早停。
target_listings_per_keyword = 48
max_tiles_per_keyword = 6
tile_scroll_viewport_ratio = 0.80
tile_overlap_ratio = 0.20
min_new_rows_per_tile = 2
allow_second_page = false
# 成功截图默认删除；只有登录/验证码/风控/连续异常等人工介入级别才保留截图。
retain_screenshots = human_required_only
allow_midscene_page_state_probe = true
calibration_top_reserved_ratio = 0.24
calibration_bottom_reserved_ratio = 0.06

[SESSION]
# 登录态和账号健康由人工维护；程序只检测、暂停、记录。
daily_keyword_budget = 20
hourly_keyword_budget = 5
cooldown_minutes = 60
max_consecutive_abnormal = 2
pause_on_login_required = true
pause_on_captcha_required = true
pause_on_white_skeleton = true

[INPUT]
excel_file =
card_name_column = 中文卡牌名
product_id_column = productId
keyword_prefix = 万智牌

[FILTER]
require_magic_prefix = true
require_card_name = true
exclude_title_keywords = token,徽记,补充包,补充盒,衍生物,代牌,牌套,卡膜,卡盒,牌盒,卡册,牌本,收纳,周边,海报,指示物
filtered_dir = data/filtered
use_db_reference = true
enable_llm_filter = true
exclude_shop_names = 真橙卡牌
short_name_hard_veto = true
# 短名硬拦截：每个目标牌名拉取的「更长官方名」条数上限（按长度升序取前 N 条）
short_name_conflict_limit = 200

[RATE_LIMIT]
# 与常用本机配置对齐
delay_min = 2
delay_max = 12
pause_every = 25
pause_duration = 60
rate_limit_retry_attempts = 2
rate_limit_cooldown = 180
rate_limit_backoff = 1.5

[CHECKPOINT]
checkpoint_dir = data/checkpoints
auto_resume = true

[LOGGING]
level = INFO
log_file = data/logs/automation.log

[LLM]
provider = zhipu
# 敏感：留空，使用环境变量 ZHIPU_API_KEY 或本机 settings.ini
zhipu_api_key =
# 与常用本机配置对齐（Coding Plan 端点与模型名按你环境可改）
zhipu_api_base = https://open.bigmodel.cn/api/coding/paas/v4
zhipu_model = glm-4.7-flashx
max_tokens = 8192
batch_size = 5
max_workers = 3
request_delay = 0.8
zhipu_retry_attempts = 4
zhipu_retry_delay = 1.0
zhipu_retry_backoff = 2.0
use_web_search_fallback = false
web_search_model = glm-5
web_search_engine = search_pro
web_search_count = 5
web_search_content_size = medium
web_search_recency_filter = noLimit

[DB]
# 启用数据库参考时改为 true，并填写 host 等（勿将真实主机提交到仓库）
enabled = false
use_ssh_tunnel = false
host =
port = 3306
database =
username =
password =
connect_timeout = 8
max_candidates_per_name = 5

[SSH]
host =
port = 22
username =
password =
local_bind_port = 0

[PRODUCT_ROUTING]
# 敏感/本机路径：留空，在 settings.ini 填写或使用 CLI
raw_input_file =
# preferred_mode 当前支持：statistical / skip / with_keywords
# with_keywords 是远期待处理路由：未来用“万智牌 中文牌名 关键词”结果统计赋值，当前不执行额外关键词采集。
preferred_mode_column = preferred_mode
pricing_mode_column = pricing_mode
output_price_column = 准确淘宝价
capture_time_output_column = 淘宝采集时间
unknown_min_valid_prices = 40

[STATISTICAL_EVAL]
target_quantile = 0.25
min_cluster_size = 4
# 老牌放宽成簇门槛：若该牌名下所有行的“发售时间”均可解析，且都早于该日期，则 effective_min_cluster_size 降为 old_release_min_cluster_size
old_release_cutoff_date = 2009-10-01
old_release_min_cluster_size = 3
abs_tolerance = 10
max_span_ratio = 1.6
enable_weighted_cluster_stats = true
enable_prefix_pool_selection = true
# 前缀池不再要求「全牌有效一口价条数」下限，仅要求前缀条数 >= min_cluster_size 且满足断层
# 断层绝对差：首个大簇底价 − 前缀池最高价。可小于 abs_tolerance（生长是相对簇起点，断层是两段边界）
prefix_pool_gap_abs = 6
prefix_pool_gap_ratio = 1.30
block_if_prefix_mass_without_gap = false
