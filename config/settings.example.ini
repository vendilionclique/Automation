# 复制本文件为 config/settings.ini 后在本机填写密钥与主机等敏感项。
# settings.ini 已被 .gitignore 忽略，勿提交仓库。
#
# 下列键含敏感信息，示例中一律留空，请在本机 settings.ini 或环境变量中补齐：
#   LLM: zhipu_api_key（可用环境变量 ZHIPU_API_KEY）
#   DB: host / database / username / password（可用环境变量 MTG_DB_*）
#   SSH: host / username / password（可用环境变量 MTG_SSH_*）
#   PRODUCT_ROUTING: raw_input_file（本机 Excel 路径）
#
# 本文件默认值已与当前 Midscene computer 视觉主线对齐（非敏感项）；
# 与代码内 fallback 不一致时以本文件为准。

[VISUAL_CAPTURE]
# 当前主线：midscene-computer MCP，由 Codex App 调度。
# 只使用系统截图观察和系统鼠标/键盘/滚轮动作，不连接淘宝页面 CDP，
# 不读取 DOM/HTML/network/cookies/storage。
provider = midscene_computer
confidence_threshold = 0.80
# 正常高置信 ingest 成功后删除原始截图；异常/低置信复核时保留。
screenshot_retention = false

[MIDSCENE_COMPUTER]
# Midscene computer 由 Codex App MCP 调度；本项目只生成任务请求与证据路径。
# 采集前用 local/start_taobao_visual_chrome.sh 启动专用 Chrome profile，
# 人工登录淘宝，并保证 Chrome 位于前台。
window_width = 1600
window_height = 1000
max_scrolls_per_keyword = 2
page_load_wait = 8
min_rows_per_keyword = 5
screenshot_prefixes = initial,results,scroll_1

[MIDSCENE_MODEL]
# Midscene computer 的外部 VLM 只用于局部视觉定位/操作，不作为最终商品字段来源。
# 真实 key 建议填到 local/midscene-computer.env；本节仅记录期望配置名。
enabled = false
model_name =
model_family =
base_url =
api_key_env = MIDSCENE_MODEL_API_KEY
allow_midscene_act = false
allow_midscene_query = false
final_extraction_owner = codex

[BROWSER_USE]
# 旧 MVP/对照路线：browser-use MCP 或项目内 browser-use Agent fallback。
# 源码审计后，browser-use 的默认 state/index 能力不再作为淘宝主线。
# 不使用 Browser Use Cloud、代理、stealth、云端 captcha solver。
allowed_domains = https://www.taobao.com,https://s.taobao.com,*.taobao.com
chrome_executable_path = /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
# 仅复现旧 browser-use/CDP 测试时填写。Midscene computer 主线不需要 CDP 连接。
# macOS 常见主 profile: ~/Library/Application Support/Google/Chrome
chrome_user_data_dir =
chrome_profile_directory = Default
headless = false
keep_alive = false
enable_default_extensions = false
window_width = 1600
window_height = 1000
max_scrolls_per_keyword = 2
page_load_wait = 8
min_rows_per_keyword = 5
max_steps = 20
use_vision = true
save_history = true

# 旧 browser-use MCP 配置建议：
# command = /Users/zhunshi/workspace/automation/.venv/bin/browser-use
# args = --mcp --profile Default
# env 里可放 BROWSER_USE_CONFIG_FILE=/Users/zhunshi/workspace/automation/config/settings.ini

[BROWSER_USE_AGENT]
# 可选 fallback：项目内直接运行 browser-use Agent 时才需要 LLM API key。
# 主线不使用本段；主线由 Codex 调度 MCP，所以不需要这里的 key。
enabled = false
llm_provider = zhipu
llm_model = glm-4.7-flashx
llm_api_key =
llm_api_key_env = ZHIPU_API_KEY
llm_base_url = https://open.bigmodel.cn/api/paas/v4

[SESSION]
# 登录态和账号健康由人工维护；程序只检测、暂停、记录。
daily_keyword_budget = 20
hourly_keyword_budget = 5
cooldown_minutes = 60
max_consecutive_abnormal = 2
pause_on_login_required = true
pause_on_captcha_required = true
pause_on_white_skeleton = true

[INPUT]
excel_file =
card_name_column = 中文卡牌名
product_id_column = productId
keyword_prefix = 万智牌

[FILTER]
require_magic_prefix = true
require_card_name = true
exclude_title_keywords = token,徽记,补充包,补充盒,衍生物,代牌,牌套,卡膜,卡盒,牌盒,卡册,牌本,收纳,周边,海报,指示物
filtered_dir = data/filtered
use_db_reference = true
enable_llm_filter = true
exclude_shop_names = 真橙卡牌
short_name_hard_veto = true
# 短名硬拦截：每个目标牌名拉取的「更长官方名」条数上限（按长度升序取前 N 条）
short_name_conflict_limit = 200

[RATE_LIMIT]
# 与常用本机配置对齐
delay_min = 2
delay_max = 12
pause_every = 25
pause_duration = 60
rate_limit_retry_attempts = 2
rate_limit_cooldown = 180
rate_limit_backoff = 1.5

[CHECKPOINT]
checkpoint_dir = data/checkpoints
auto_resume = true

[LOGGING]
level = INFO
log_file = data/logs/automation.log

[LLM]
provider = zhipu
# 敏感：留空，使用环境变量 ZHIPU_API_KEY 或本机 settings.ini
zhipu_api_key =
# 与常用本机配置对齐（Coding Plan 端点与模型名按你环境可改）
zhipu_api_base = https://open.bigmodel.cn/api/coding/paas/v4
zhipu_model = glm-4.7-flashx
max_tokens = 8192
batch_size = 5
max_workers = 3
request_delay = 0.8
zhipu_retry_attempts = 4
zhipu_retry_delay = 1.0
zhipu_retry_backoff = 2.0
use_web_search_fallback = false
web_search_model = glm-5
web_search_engine = search_pro
web_search_count = 5
web_search_content_size = medium
web_search_recency_filter = noLimit

[DB]
# 启用数据库参考时改为 true，并填写 host 等（勿将真实主机提交到仓库）
enabled = false
use_ssh_tunnel = false
host =
port = 3306
database =
username =
password =
connect_timeout = 8
max_candidates_per_name = 5

[SSH]
host =
port = 22
username =
password =
local_bind_port = 0

[PRODUCT_ROUTING]
# 敏感/本机路径：留空，在 settings.ini 填写或使用 CLI
raw_input_file =
preferred_mode_column = preferred_mode
pricing_mode_column = pricing_mode
output_price_column = 准确淘宝价
unknown_min_valid_prices = 40

[STATISTICAL_EVAL]
target_quantile = 0.25
min_cluster_size = 4
# 老牌放宽成簇门槛：若该牌名下所有行的“发售时间”均可解析，且都早于该日期，则 effective_min_cluster_size 降为 old_release_min_cluster_size
old_release_cutoff_date = 2009-10-01
old_release_min_cluster_size = 3
abs_tolerance = 10
max_span_ratio = 1.6
enable_weighted_cluster_stats = true
enable_prefix_pool_selection = true
# 前缀池不再要求「全牌有效一口价条数」下限，仅要求前缀条数 >= min_cluster_size 且满足断层
# 断层绝对差：首个大簇底价 − 前缀池最高价。可小于 abs_tolerance（生长是相对簇起点，断层是两段边界）
prefix_pool_gap_abs = 6
prefix_pool_gap_ratio = 1.30
block_if_prefix_mass_without_gap = false
